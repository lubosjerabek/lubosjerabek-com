name: Deploy to hosting via FTP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Write the .env file from GitHub Secrets so it gets uploaded to the server.
      # The file is never committed to git — it only exists during this workflow run.
      - name: Write .env
        run: |
          cat > .env <<EOF
          LINKEDIN_CLIENT_ID=${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET=${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_REDIRECT_URI=${{ secrets.LINKEDIN_REDIRECT_URI }}
          EOF

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}

          # Use 'ftps' (FTP over TLS) — supported by virtually all shared hosts.
          # Switch to 'sftp' if your host provides SSH access on port 22.
          protocol: ftps

          # Never upload git internals, CI config, or runtime-generated files
          # that should live only on the server (token, cache).
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            data/linkedin_token.json
            data/linkedin_posts_cache.json
